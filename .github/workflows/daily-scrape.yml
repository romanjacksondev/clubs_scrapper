name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape all clubs
        run: |
          clubs=$(curl -sf "${{ vars.APP_URL }}/api/clubs")
          if [ -z "$clubs" ]; then
            echo "Failed to fetch clubs"
            exit 1
          fi

          echo $clubs | jq -c '.[]' | while read club; do
            id=$(echo $club | jq '.id')
            name=$(echo $club | jq -r '.name')
            league=$(echo $club | jq -r '.league.name')
            echo "Scraping $name ($league)..."
            curl -sf -X POST "${{ vars.APP_URL }}/api/scrape" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -d "{\"league\":\"$league\",\"club\":\"$name\",\"clubId\":$id}" \
              && echo "Done: $name" || echo "Failed: $name"
            sleep 10
          done
